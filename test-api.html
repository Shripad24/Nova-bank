<!DOCTYPE html>
<html>
<head>
    <title>Test Gemini API</title>
</head>
<body>
    <h1>Gemini API Test</h1>
    <button onclick="testAPI()">Test API</button>
    <pre id="output"></pre>

    <script>
        async function testAPI() {
            const apiKey = 'AIzaSyCrZIMoJmH-iUL9oUjL5dV21zWOVroEYpM';
            const output = document.getElementById('output');
            
            output.textContent = 'Sending request to Gemini 2.5 Flash...';
            
            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
                    {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            contents: [{
                                role: 'user',
                                parts: [{ text: 'What is a credit card?' }]
                            }],
                            generationConfig: {
                                temperature: 0.9,
                                topK: 1,
                                topP: 1,
                                maxOutputTokens: 2048,
                            }
                        })
                    }
                );
                
                output.textContent = `Status: ${response.status}\n\n`;
                
                if (!response.ok) {
                    const errorText = await response.text();
                    output.textContent += `Error:\n${errorText}`;
                    return;
                }
                
                const data = await response.json();
                output.textContent += `Success!\n\nFull Response:\n${JSON.stringify(data, null, 2)}`;
                
                if (data.candidates && data.candidates[0]) {
                    output.textContent += `\n\nGenerated Text:\n${data.candidates[0].content.parts[0].text}`;
                }
            } catch (error) {
                output.textContent = `Error: ${error.message}\n\n${error.stack}`;
            }
        }
    </script>
</body>
</html>
